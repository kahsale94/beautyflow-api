{% extends "admin/base.html" %}

{% block title %}Calendário - Beautyflow Admin{% endblock %}

{% block head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <h1>Calendário</h1>
        <p class="muted">Visualize, crie e atualize agendamentos.</p>
    </div>
</header>

<section class="card">
    <h2>Novo agendamento</h2>
    <form method="post" action="/admin/appointments" class="form-grid">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
        <label>Cliente
            <select name="client_id" required>
                {% for client in clients %}
                <option value="{{ client.id }}">
                    {{ client.name or client.phone }} — {{ client.phone }}
                </option>
                {% endfor %}
            </select>
        </label>
        <label>Profissional
            <select name="professional_id" required id="professional-filter-source">
                {% for professional in professionals %}
                <option value="{{ professional.id }}">{{ professional.name }}</option>
                {% endfor %}
            </select>
        </label>
        <label>Serviço
            <select name="service_id" required>
                {% for service in services %}
                <option value="{{ service.id }}">
                    {{ service.name }} — {{ service.duration_minutes }} min
                </option>
                {% endfor %}
            </select>
        </label>
        <label>Data e hora
            <input name="start_datetime" required type="datetime-local" />
        </label>
        <button class="button primary align-end" type="submit">Criar</button>
    </form>
</section>

<section class="card">
    <div class="card-header">
        <h2>Agenda</h2>
        <label class="inline-label">Filtrar profissional
            <select id="calendar-professional-filter">
                <option value="">Todos</option>
                {% for professional in professionals %}
                <option value="{{ professional.id }}">{{ professional.name }}</option>
                {% endfor %}
            </select>
        </label>
    </div>
    <div id="calendar" data-events-url="/admin/appointments/events"></div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='admin/js/calendar.js') }}"></script>
{% endblock %}

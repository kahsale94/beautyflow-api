{% extends "admin/base.html" %}

{% block title %}Calendário - Beautyflow Admin{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', path='admin/vendor/flatpickr/flatpickr.min.css') }}" />
<script src="{{ url_for('static', path='admin/vendor/fullcalendar/index.global.min.js') }}"></script>
<script src="{{ url_for('static', path='admin/vendor/flatpickr/flatpickr.min.js') }}"></script>
<script src="{{ url_for('static', path='admin/vendor/flatpickr/l10n/pt.js') }}"></script>
{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <h1>Calendário</h1>
        <p class="muted">Visualize, crie e atualize agendamentos.</p>
    </div>
</header>

<section class="grid two-columns appointment-management-grid">
    <form method="post" action="/admin/appointments" class="card stack appointment-create-card">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
        <h2>Novo agendamento</h2>
        <div class="form-grid compact-grid appointment-create-form-grid">
            <label>Cliente
                <select name="client_id" required>
                    {% for client in clients %}
                    <option value="{{ client.id }}">
                        {{ client.name or client.phone }} — {{ client.phone }}
                    </option>
                    {% endfor %}
                </select>
            </label>
            <label>Profissional
                <select name="professional_id" required id="professional-filter-source">
                    {% for professional in professionals %}
                    <option value="{{ professional.id }}">{{ professional.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Serviço
                <select name="service_id" required>
                    {% for service in services %}
                    <option value="{{ service.id }}">
                        {{ service.name }} — {{ service.duration_minutes }} min
                    </option>
                    {% endfor %}
                </select>
            </label>
            <label>Data e hora
                <input
                    name="start_datetime"
                    required
                    type="text"
                    data-datetime-picker
                    data-timezone="{{ business_timezone }}"
                    data-minute-increment="{{ business.slot_interval_minutes }}"
                    value="{{ default_start_datetime }}"
                    min="{{ min_start_datetime }}"
                    max="{{ max_start_datetime }}" />
            </label>
        </div>
        <div class="appointment-create-actions">
            <button class="button primary appointment-create-button" type="submit">Criar</button>
        </div>
    </form>

    <form method="post" action="/admin/appointments/blocks" class="card stack schedule-block-form" id="schedule-block-form">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
        <h2>Fechar agenda</h2>
        <div class="form-grid compact-grid schedule-block-form-grid">
            <label>Profissional
                <select name="block_professional_id" required>
                    {% for professional in professionals %}
                    <option value="{{ professional.id }}">{{ professional.name }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Motivo
                <select name="reason" required>
                    {% for reason, label in schedule_block_reasons.items() %}
                    <option value="{{ reason }}">{{ label }}</option>
                    {% endfor %}
                </select>
            </label>
            <label>Data e hora inicial
                <input
                    name="block_start_datetime"
                    required
                    type="text"
                    data-datetime-picker
                    data-timezone="{{ business_timezone }}"
                    data-minute-increment="{{ business.slot_interval_minutes }}"
                    value="{{ default_start_datetime }}"
                    min="{{ min_start_datetime }}"
                    max="{{ max_start_datetime }}" />
            </label>
            <label data-schedule-block-duration-field>Quantidade de horas
                <input
                    name="duration_hours"
                    type="number"
                    inputmode="decimal"
                    min="0.25"
                    max="24"
                    step="0.25"
                    value="1"
                    required
                    data-schedule-block-duration />
            </label>
            <label class="schedule-block-toggle grid-span-2">
                <input type="checkbox" name="all_day" value="true" data-schedule-block-all-day />
                <span>
                    Fechar o dia inteiro
                    <small>Quando ligado, a quantidade de horas será ignorada.</small>
                </span>
            </label>
        </div>
        <button class="button primary schedule-block-submit" type="submit">Fechar agenda</button>
    </form>
</section>

<section class="card calendar-card">
    <div class="card-header calendar-card-header">
        <h2>Agenda</h2>
        <label class="inline-label calendar-filter-label">
            <span class="calendar-filter-label-text">Filtrar profissional</span>
            <select id="calendar-professional-filter">
                <option value="">Todos</option>
                {% for professional in professionals %}
                <option value="{{ professional.id }}">{{ professional.name }}</option>
                {% endfor %}
            </select>
        </label>
    </div>
    <div id="calendar-month-strip" class="calendar-month-strip" aria-label="Navegar por mês"></div>
    <div id="calendar"
        data-events-url="/admin/appointments/events"
        data-timezone="{{ business_timezone }}"
        data-slot-duration="{{ slot_duration }}">
    </div>
</section>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', path='admin/js/calendar.js') }}"></script>
{% endblock %}

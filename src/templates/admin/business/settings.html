{% extends "admin/base.html" %}

{% block title %}Empresa - Beautyflow Admin{%endblock %}

{% block content %}
<header class="page-header">
    <div>
        <h1>Dados da empresa</h1>
        <p class="muted">Informações públicas e regras de agendamento.</p>
    </div>
</header>

<form method="post" action="/admin/business" class="stack settings-form">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />

    <section class="settings-grid">
        <div class="card settings-card stack">
            <h2 class="section-title">Informações gerais</h2>
            <div class="form-grid compact-grid">
                <label>Nome
                    <input name="name" required minlength="3" maxlength="50" value="{{ business.name }}" />
                </label>
                <label>Slug
                    <input name="slug" pattern="[a-z0-9]+(-[a-z0-9]+)*" value="{{ business.slug or '' }}" />
                </label>
                <label>Tipo
                    <select name="type" required>
                        {% for type in business_types %}
                        <option value="{{ type.value }}" {% if type == business.type %}selected{% endif %}>
                            {{ type.value }}
                        </option>
                        {% endfor %}
                    </select>
                </label>
                <label>Timezone
                    <input name="timezone" required value="{{ business.timezone }}" />
                </label>
            </div>
            <label>Descrição
                <textarea name="description" rows="4">{{ business.description or '' }}</textarea>
            </label>
        </div>

        <div class="card settings-card stack">
            <h2 class="section-title">Contato e localização</h2>
            <div class="form-grid compact-grid">
                <label>Telefone
                    <input name="phone" value="{{ business.phone or '' }}" />
                </label>
                <label>Email
                    <input name="email" type="email" value="{{ business.email or '' }}" />
                </label>
                <label>Endereço
                    <input name="address" value="{{ business.address or '' }}" />
                </label>
                <label>Cidade
                    <input name="city" value="{{ business.city or '' }}" />
                </label>
                <label>Estado
                    <input name="state" value="{{ business.state or '' }}" />
                </label>
            </div>
        </div>
    </section>

    <section class="card settings-card stack">
        <h2 class="section-title">Configurações de agendamento</h2>
        <div class="form-grid compact-grid">
            <label>Intervalo dos slots em minutos
                <input name="slot_interval_minutes" type="number" min="1" max="240"
                    value="{{ business.slot_interval_minutes }}" />
                <span class="field-help">Ex.: 15 cria horários de 15 em 15 minutos.</span>
            </label>
            <label>Antecedência mínima em minutos
                <input name="minimum_notice_minutes" type="number" min="0"
                    value="{{ business.minimum_notice_minutes }}" />
                <span class="field-help">Tempo mínimo entre agora e o horário permitido para agendar.</span>
            </label>
            <label>Dias máximos para agendar
                <input name="maximum_schedule_days" type="number" min="1" max="365"
                    value="{{ business.maximum_schedule_days }}" />
                <span class="field-help">Até quantos dias no futuro o cliente pode escolher.</span>
            </label>
            <label>Limite de cancelamento em horas
                <input name="cancel_limit_hours" type="number" min="0"
                    value="{{ business.cancel_limit_hours }}" />
                <span class="field-help">Até quantas horas antes o cliente pode cancelar.</span>
            </label>
        </div>

        <div class="checkbox-grid">
            <label class="check-card">
                <input type="checkbox" name="booking_enabled" {% if business.booking_enabled %}checked{% endif %} />
                <span>
                    Agenda pública ativa
                    <small>Permite que clientes criem agendamentos pelo fluxo público.</small>
                </span>
            </label>
            <label class="check-card">
                <input type="checkbox" name="allow_client_cancel" {% if business.allow_client_cancel %}checked{% endif %} />
                <span>
                    Permitir cancelamento pelo cliente
                    <small>Cliente pode cancelar dentro do limite configurado.</small>
                </span>
            </label>
            <label class="check-card">
                <input type="checkbox" name="appointment_confirmation_required" {% if business.appointment_confirmation_required %}checked{% endif %} />
                <span>
                    Exigir confirmação manual
                    <small>Novos agendamentos exigem revisão antes da confirmação.</small>
                </span>
            </label>
        </div>
    </section>

    <div class="settings-actions">
        <button class="button primary" type="submit">Salvar empresa</button>
    </div>
</form>
{% endblock %}

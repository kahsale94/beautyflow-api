{% extends "admin/base.html" %}

{% block title %}Minha senha - Beautyflow{% endblock %}

{% block content %}
<header class="page-header">
    <div>
        <h1>Minha senha</h1>
        <p class="muted">Altere a senha usada para acessar o painel administrativo.</p>
    </div>
</header>

<section class="card settings-card narrow-card">
    <form method="post" action="/admin/account/password" class="stack">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token }}" />
        <label>Senha atual
            <input type="password" name="current_password" required autocomplete="current-password" />
        </label>
        <label>Nova senha
            <input type="password" name="new_password" required minlength="8" autocomplete="new-password" />
        </label>
        <label>Confirmar nova senha
            <input type="password" name="confirm_password" required minlength="8" autocomplete="new-password" />
        </label>
        <div class="settings-actions">
            <button class="button primary" type="submit">Alterar senha</button>
        </div>
    </form>
</section>
{% endblock %}
